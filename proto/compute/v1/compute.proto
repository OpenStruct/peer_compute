syntax = "proto3";

package compute.v1;

option go_package = "github.com/OpenStruct/peer_compute/gen/compute/v1;computev1";

import "google/protobuf/timestamp.proto";

// Resource capacity advertised by a provider.
message Resources {
  uint32 cpu_cores = 1;
  uint64 memory_mb = 2;
  uint64 disk_gb = 3;
  uint32 gpu_count = 4;
  string gpu_model = 5;
}

message Provider {
  string id = 1;
  string name = 2;
  string address = 3;
  Resources capacity = 4;
  Resources available = 5;
  string status = 6; // "online", "offline", "busy"
  google.protobuf.Timestamp last_heartbeat = 7;
  google.protobuf.Timestamp registered_at = 8;
  string public_address = 9; // STUN-discovered public IP:port
}

message Session {
  string id = 1;
  string provider_id = 2;
  string renter_id = 3;
  Resources allocated = 4;
  string status = 5; // "pending", "running", "terminated"
  string container_id = 6;
  string ssh_endpoint = 7;
  string image = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp terminated_at = 10;
  string wg_public_key = 11;     // provider-side WireGuard public key
  string wg_endpoint = 12;       // provider's WireGuard endpoint
  string connection_mode = 13;   // "direct", "holepunch", "relay"
  string relay_token = 14;       // token for relay authentication
  string wg_provider_ip = 15;   // per-session tunnel IP for provider (e.g. "10.99.1.1")
  string wg_renter_ip = 16;     // per-session tunnel IP for renter (e.g. "10.99.1.2")
  string ssh_public_key_auth = 17; // per-session SSH public key (authorized_keys format)
}

// ── NAT Traversal ───────────────────────────────────────────────────

message EndpointCandidate {
  string address = 1;    // ip:port
  string type = 2;       // "host", "srflx" (server-reflexive), "relay"
  int64 priority = 3;
}

message ExchangeCandidatesRequest {
  string session_id = 1;
  string peer_id = 2;
  repeated EndpointCandidate candidates = 3;
  string wg_public_key = 4;
}

message ExchangeCandidatesResponse {
  repeated EndpointCandidate peer_candidates = 1;
  string peer_wg_public_key = 2;
  string relay_address = 3;
  string relay_token = 4;
}

message ReportConnectionResultRequest {
  string session_id = 1;
  string peer_id = 2;
  string selected_endpoint = 3;
  bool use_relay = 4;
}

message ReportConnectionResultResponse {
  bool acknowledged = 1;
}

// ── Requests / Responses ────────────────────────────────────────────

message RegisterProviderRequest {
  string name = 1;
  string address = 2;
  Resources capacity = 3;
}

message RegisterProviderResponse {
  Provider provider = 1;
  string token = 2;
}

message HeartbeatRequest {
  string provider_id = 1;
  Resources available = 2;
  repeated string active_sessions = 3;
}

message HeartbeatResponse {
  bool acknowledged = 1;
  repeated string terminate_sessions = 2;
}

message ListProvidersRequest {
  uint32 min_cpu = 1;
  uint64 min_memory_mb = 2;
  uint32 min_gpu = 3;
}

message ListProvidersResponse {
  repeated Provider providers = 1;
}

message CreateSessionRequest {
  string provider_id = 1;
  string renter_id = 2;
  Resources requested = 3;
  string image = 4;
  string wg_public_key = 5; // renter's WireGuard public key
}

message CreateSessionResponse {
  Session session = 1;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message TerminateSessionRequest {
  string session_id = 1;
}

message TerminateSessionResponse {
  bool success = 1;
}

message ListProviderSessionsRequest {
  string provider_id = 1;
  string status_filter = 2;
}

message ListProviderSessionsResponse {
  repeated Session sessions = 1;
}

message UpdateSessionStatusRequest {
  string session_id = 1;
  string status = 2;
  string container_id = 3;
  string ssh_endpoint = 4;
  string wg_public_key = 5;
  string wg_endpoint = 6;
}

message UpdateSessionStatusResponse {
  bool success = 1;
}

// ── Services ────────────────────────────────────────────────────────

service RegistryService {
  // Provider lifecycle
  rpc RegisterProvider(RegisterProviderRequest) returns (RegisterProviderResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);

  // Session management
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc TerminateSession(TerminateSessionRequest) returns (TerminateSessionResponse);

  // Agent-facing RPCs
  rpc ListProviderSessions(ListProviderSessionsRequest) returns (ListProviderSessionsResponse);
  rpc UpdateSessionStatus(UpdateSessionStatusRequest) returns (UpdateSessionStatusResponse);

  // NAT traversal
  rpc ExchangeCandidates(ExchangeCandidatesRequest) returns (ExchangeCandidatesResponse);
  rpc ReportConnectionResult(ReportConnectionResultRequest) returns (ReportConnectionResultResponse);
}
