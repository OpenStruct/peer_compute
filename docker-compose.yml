services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: peercompute
      POSTGRES_USER: peercompute
      POSTGRES_PASSWORD: peercompute
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  registry:
    build:
      context: .
      dockerfile: Dockerfile
      target: registry
    ports:
      - "50051:50051"
      - "3478:3478/udp"
      - "3479:3479/udp"
    environment:
      PORT: "50051"
      STUN_PORT: "3478"
      RELAY_PORT: "3479"
      DATABASE_URL: postgres://peercompute:peercompute@postgres:5432/peercompute?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
